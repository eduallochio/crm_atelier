<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:#A07830"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#0f0f0f" rx="6"/>

  <!-- Pivot -->
  <circle cx="16" cy="16" r="1.8" fill="#C9A84C"/>
  <circle cx="16" cy="16" r="0.8" fill="#0f0f0f"/>

  <!-- Blade 1 — upper left -->
  <polygon points="16,16 15.5,15.5 6.5,8.5 7.3,7.8" fill="url(#g1)"/>

  <!-- Blade 2 — upper right -->
  <polygon points="16,16 16.5,15.5 25.5,8.5 24.7,7.8" fill="url(#g2)"/>

  <!-- Handle 1 — lower left -->
  <circle cx="11.5" cy="22.5" r="3.8" fill="none" stroke="url(#g1)" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="13" y2="19.5" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Handle 2 — lower right -->
  <circle cx="20.5" cy="22.5" r="3.8" fill="none" stroke="url(#g2)" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="19" y2="19.5" stroke="url(#g2)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Cut line -->
  <line x1="4" y1="16" x2="28" y2="16"
    stroke="#C9A84C" stroke-width="0.5" stroke-opacity="0.3"
    stroke-dasharray="2,3" stroke-linecap="round"/>
</svg>
