<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" width="480" height="96">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="50%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#A07830"/>
    </linearGradient>
    <linearGradient id="goldG2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C96A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#181818"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="480" height="96" fill="url(#bgG)" rx="14"/>

  <!-- ── ICON (left, scaled to 96x96 box, offset 0) ── -->
  <g transform="translate(14, 8) scale(0.155)">
    <!-- Pivot -->
    <circle cx="256" cy="256" r="10" fill="url(#goldG)"/>
    <circle cx="256" cy="256" r="5" fill="#0f0f0f"/>

    <!-- Blade 1 -->
    <polygon points="256,256 248,248 118,148 130,138" fill="url(#goldG)"/>
    <polygon points="118,148 130,138 115,134" fill="#E8C96A"/>

    <!-- Blade 2 -->
    <polygon points="256,256 264,248 394,148 382,138" fill="url(#goldG2)"/>
    <polygon points="394,148 382,138 397,134" fill="#E8C96A"/>

    <!-- Handle 1 -->
    <circle cx="194" cy="354" r="52" fill="none" stroke="url(#goldG)" stroke-width="14"/>
    <circle cx="194" cy="354" r="28" fill="none" stroke="url(#goldG)" stroke-width="5" stroke-opacity="0.5"/>
    <line x1="256" y1="256" x2="206" y2="315" stroke="url(#goldG)" stroke-width="14" stroke-linecap="round"/>

    <!-- Handle 2 -->
    <circle cx="318" cy="354" r="52" fill="none" stroke="url(#goldG2)" stroke-width="14"/>
    <circle cx="318" cy="354" r="28" fill="none" stroke="url(#goldG2)" stroke-width="5" stroke-opacity="0.5"/>
    <line x1="256" y1="256" x2="306" y2="315" stroke="url(#goldG2)" stroke-width="14" stroke-linecap="round"/>

    <!-- Cut line -->
    <line x1="80" y1="256" x2="432" y2="256"
      stroke="#C9A84C" stroke-width="2" stroke-opacity="0.3"
      stroke-dasharray="6,8" stroke-linecap="round"/>
  </g>

  <!-- Divider line -->
  <line x1="96" y1="18" x2="96" y2="78" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- ── WORDMARK ── -->
  <!-- "meu" — small caps, letter-spaced, golden-dim -->
  <text
    x="114" y="38"
    font-family="'Didact Gothic', 'Gill Sans', 'Optima', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="5"
    fill="#C9A84C"
    opacity="0.75"
    text-rendering="geometricPrecision"
  >MEU</text>

  <!-- "Atelier" — large, elegant serif feel via geometric sans -->
  <text
    x="112" y="72"
    font-family="'Cormorant Garamond', 'Playfair Display', 'Didot', Georgia, serif"
    font-size="36"
    font-weight="300"
    letter-spacing="2"
    fill="url(#goldG)"
    text-rendering="geometricPrecision"
  >Atelier</text>

  <!-- Tagline dot accent -->
  <circle cx="288" cy="68" r="2.5" fill="#C9A84C" opacity="0.6"/>
</svg>
